const TEXT_TERTIARY = "rgba(232,224,208,0.2)";
const BG = "#111110";
const SURFACE = "rgba(232,224,208,0.03)";
const BORDER = "rgba(232,224,208,0.07)";

function generatePrompts(name, location, service) {
  const city = location.split(",")[0].trim();
  return [
    `What's the best ${service} in ${location}?`,
    `I need ${service} in ${city}. Who do you recommend?`,
    `Top rated ${service} providers near ${location}`,
    `Who should I hire for ${service} in ${city}?`,
    `Recommend a good ${service} company in ${location}`,
    `Best ${service} in ${city} area with good reviews`,
    `I'm looking for a reliable ${service} provider in ${location}. Any suggestions?`,
    `Compare the top ${service} companies in ${city}`,
  ];
}

async function queryAI(prompt) {
  try {
    const r = await fetch("https://aldren-api.team-be7.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4096,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await r.json();
    if (data.error) { console.error("API error:", data.error); return ""; }
    // Handle multi-turn: if stop_reason is tool_use, we got search results but no final text yet
    // Collect any text blocks from the response
    const textParts = (data.content || []).filter(b => b.type === "text").map(b => b.text);
    if (textParts.length > 0) return textParts.join("\n");
    // If no text yet (model used web_search and stopped), we need to continue the conversation
    // by sending back the tool results - but the API handles this automatically with web_search tool
    // So if we got here with no text, try without web search as fallback
    console.log("No text in response, trying without web search for:", prompt);
    const r2 = await fetch("https://aldren-api.team-be7.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data2 = await r2.json();
    return (data2.content || []).filter(b => b.type === "text").map(b => b.text).join("\n") || "";
  } catch (e) { console.error("Fetch error:", e); return ""; }
}

function checkMention(text, name) {
  const l = text.toLowerCase(), n = name.toLowerCase().trim();
  if (l.includes(n)) return true;
  const words = n.split(/\s+/).filter((w) => w.length >= 3);
  if (words.length > 1 && words.filter((w) => l.includes(w)).length >= Math.ceil(words.length * 0.7)) return true;
  return false;
}

function extractCompetitors(text, name) {
  const comps = [];
  [/\*\*([A-Z][A-Za-z&'.\-\s]{2,40})\*\*/g, /\d+\.\s+\*?\*?([A-Z][A-Za-z&'.\-\s]{2,40})\*?\*?/g, /(?:recommend|suggest|consider|try|check out|contact)\s+([A-Z][A-Za-z&'.\-\s]{2,40})/g].forEach((p) => {
    let m; while ((m = p.exec(text)) !== null) {
      const c = m[1].trim().replace(/[.\s]+$/, "");
      if (c.toLowerCase() !== name.toLowerCase().trim() && c.length > 3 && c.length < 42 && !comps.find((x) => x.toLowerCase() === c.toLowerCase())) comps.push(c);
    }
  });
  return comps.slice(0, 10);
}

function rankCompetitors(mentionResults, businessName) {
  const freq = {};
  mentionResults.forEach((r) => {
    extractCompetitors(r.response, businessName).forEach((c) => {
      const key = c.toLowerCase();
      if (!freq[key]) freq[key] = { name: c, count: 0 };
      freq[key].count++;
    });
  });
  return Object.values(freq).sort((a, b) => b.count - a.count).slice(0, 8);
}

function getGrade(score) {
  if (score >= 80) return { letter: "A", color: "#6b9e78", label: "Excellent" };
  if (score >= 60) return { letter: "B", color: "#7ba887", label: "Good" };
  if (score >= 40) return { letter: "C", color: ACCENT, label: "Fair" };
  if (score >= 20) return { letter: "D", color: "#c47d52", label: "Poor" };
  return { letter: "F", color: "#b55a4a", label: "Invisible" };
}

function estimateLostLeads(score) { return Math.round(85 * ((100 - score) / 100)); }

function getFreeQuickWin(score, mentionResults, business) {
  if (score === 0) return { title: "Claim your Google Business Profile", what: `Search for "${business.name}" on Google. If no Business Profile appears, go to business.google.com and claim your listing. Complete every field: name, category "${business.service}", area "${business.location}", hours, phone, website. Add at least 5 photos.`, why: "Google Business Profile is the primary data source AI pulls from during web searches. Without it, you're invisible. This alone can move your score from 0 to 15-25 within weeks.", time: "20 min" };
  if (score < 40) return { title: `Add an FAQ page to your website`, what: `Create a page with 8-10 questions your customers ask, like "What's the best ${business.service} in ${business.location.split(",")[0]}?" Answer each in 2-3 sentences with your business name included naturally.`, why: "AI searches for pages that directly match the question being asked. An FAQ page mirroring real queries is the fastest path into AI responses.", time: "45 min" };
  if (score < 70) return { title: "Collect 5 new Google reviews this week", what: `Message your 5 most recent happy customers with a direct link to your Google review page. A simple ask: "If you were happy with our ${business.service}, a Google review would mean a lot."`, why: "AI weights recency and volume of reviews. A burst of fresh positive reviews signals that you're active and trusted.", time: "15 min" };
  return { title: "Get featured in a local publication", what: `Pitch a story to your local newspaper or industry blog. Offer expert commentary on a trending topic in ${business.service}.`, why: "Third-party mentions on authoritative sites are the strongest AI signal. One feature can make you the default recommendation.", time: "30 min" };
}

function getRecommendations(score) {
  const r = [];
  if (score < 30) r.push({ sev: 3, title: "Your business is invisible to AI", body: "When potential customers ask AI for recommendations, your business does not appear. Every query goes to competitors." });
  r.push({ sev: score < 40 ? 3 : 2, title: "Implement structured data markup", body: "Add LocalBusiness and Service schema to your website so AI can understand what you offer and where you operate." });
  r.push({ sev: 2, title: "Diversify review presence", body: "Maintain consistent profiles across Google Business, Yelp, BBB, and industry directories. AI cross-references multiple platforms." });
  r.push({ sev: 2, title: "Create AI-optimized content", body: "Publish FAQ pages and service descriptions matching the natural language people use when asking AI for help." });
  r.push({ sev: 1, title: "Build third-party authority", body: "Earn mentions in local press, industry publications, and professional associations. Independent citations are the strongest AI signal." });
  if (score < 60) r.push({ sev: 1, title: "Optimize Google Business Profile", body: "Complete every field, post updates weekly, respond to all reviews, add photos monthly." });
  return r;
}

/* ━━━ Score Arc ━━━ */
function ScoreArc({ score, size = 180 }) {
  const grade = getGrade(score);
  const r = (size - 20) / 2, circ = 2 * Math.PI * r;
  const dashArr = circ * (270 / 360);
  const offset = circ - (score / 100) * dashArr;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(232,224,208,0.06)" strokeWidth="5" strokeDasharray={`${dashArr} ${circ-dashArr}`} strokeLinecap="round" transform={`rotate(135 ${size/2} ${size/2})`} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={grade.color} strokeWidth="5" strokeDasharray={`${dashArr} ${circ-dashArr}`} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(135 ${size/2} ${size/2})`} style={{ transition: "stroke-dashoffset 2s cubic-bezier(0.16,1,0.3,1)" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontFamily: "mono", fontSize: size * 0.26, fontWeight: 600, color: grade.color, lineHeight: 1 }}>{score}</span>
        <span style={{ fontFamily: "mono", fontSize: 10, color: TEXT_TERTIARY, letterSpacing: "0.1em", marginTop: 4 }}>/ 100</span>
      </div>
    </div>
  );
}

/* ━━━ Competitor Chart ━━━ */
function CompetitorChart({ ranked, total, bizName, userMentions }) {
  if (ranked.length === 0 && userMentions === 0) return <p style={{ fontSize: 13, color: TEXT_TERTIARY, fontStyle: "italic" }}>No competitors detected.</p>;
  const all = [{ name: bizName, count: userMentions, isUser: true }, ...ranked.map((c) => ({ ...c, isUser: false }))].sort((a, b) => b.count - a.count);
  const max = Math.max(...all.map((e) => e.count), 1);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {all.map((e, i) => (
        <div key={i} style={{ animation: `fadeIn 0.4s ease-out ${i * 0.06}s both` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
            <span style={{ fontSize: 13, color: e.isUser ? TEXT_PRIMARY : TEXT_SECONDARY, fontWeight: e.isUser ? 600 : 400 }}>
              {e.name}{e.isUser && <span style={{ fontSize: 9, color: ACCENT, marginLeft: 8, fontFamily: "mono", letterSpacing: "0.08em" }}>YOU</span>}
            </span>
            <span style={{ fontFamily: "mono", fontSize: 12, fontWeight: 600, color: e.isUser ? (e.count > 0 ? ACCENT : "#b55a4a") : "rgba(181,90,74,0.6)" }}>{e.count}/{total}</span>
          </div>
          <div style={{ height: 3, background: "rgba(232,224,208,0.05)", borderRadius: 2 }}>
            <div style={{ height: "100%", borderRadius: 2, width: `${Math.max((e.count / max) * 100, e.count > 0 ? 3 : 0)}%`, background: e.isUser ? ACCENT : "rgba(181,90,74,0.4)", transition: "width 1s cubic-bezier(0.16,1,0.3,1)" }} />
          </div>
        </div>
      ))}
    </div>
  );
}

          name: form.name,
          email: form.email,
          phone: form.phone || "Not provided",

          <h3 style={{ fontSize: 18, fontWeight: 600, color: TEXT_PRIMARY, marginBottom: 6 }}>Get your custom strategy</h3>

          <button onClick={submit} style={{ width: "100%", marginTop: 18, padding: "13px", background: (!form.name || !form.email) ? "rgba(201,169,110,0.15)" : ACCENT, color: (!form.name || !form.email) ? TEXT_TERTIARY : "#111110", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, fontFamily: "'Instrument Sans', sans-serif", cursor: (!form.name || !form.email) ? "not-allowed" : "pointer" }}>Send</button>

/* ━━━ Main ━━━ */
function App() {
  const [stage, setStage] = useState("landing");
  const [biz, setBiz] = useState({ name: "", location: "", service: "" });
  const [progress, setProgress] = useState(0);
  const [statusText, setStatusText] = useState("");
  const [results, setResults] = useState(null);
  const [showContact, setShowContact] = useState(false);
  const [vis, setVis] = useState(false);
  useEffect(() => { setTimeout(() => setVis(true), 100); }, []);

  const runAudit = async () => {
    if (!biz.name || !biz.location || !biz.service) return;
    setStage("running"); setProgress(0);

    setStatusText("Generating queries..."); setProgress(5);
    const prompts = generatePrompts(biz.name, biz.location, biz.service);
    await new Promise((r) => setTimeout(r, 400));

    const mentionResults = [];
    for (let i = 0; i < prompts.length; i++) {
      setStatusText(`Querying AI: ${i + 1} of ${prompts.length}`);
      const response = await queryAI(prompts[i]);
      mentionResults.push({ prompt: prompts[i], mentioned: checkMention(response, biz.name), response });
      setProgress(5 + ((i + 1) / prompts.length) * 80);
    }

    setStatusText("Analyzing results..."); setProgress(90);
    await new Promise((r) => setTimeout(r, 500));

    const ranked = rankCompetitors(mentionResults, biz.name);
    const mentioned = mentionResults.filter((r) => r.mentioned).length;
    const score = Math.round((mentioned / mentionResults.length) * 100);

    setStatusText("Compiling report..."); setProgress(100);
    await new Promise((r) => setTimeout(r, 600));

    setResults({ score, grade: getGrade(score), mentionResults, ranked, recommendations: getRecommendations(score), mentioned, total: mentionResults.length, lostLeads: estimateLostLeads(score), quickWin: getFreeQuickWin(score, mentionResults, biz) });
    setStage("results");
  };

  const mono = "'JetBrains Mono', monospace";
  const serif = "'Cormorant Garamond', serif";
  const sans = "'Instrument Sans', sans-serif";
  const panel = { background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24, marginBottom: 20 };
  const panelHead = { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 };
  const panelTitle = { fontSize: 15, fontWeight: 600, color: TEXT_PRIMARY };
  const panelCount = { fontFamily: mono, fontSize: 11, color: TEXT_TERTIARY };
  const fieldLabel = { display: "block", fontFamily: mono, fontSize: 10, fontWeight: 500, color: TEXT_TERTIARY, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 };
  const fieldInput = { width: "100%", padding: "12px 14px", background: "rgba(0,0,0,0.25)", border: `1px solid ${BORDER}`, borderRadius: 8, color: TEXT_PRIMARY, fontSize: 14, fontFamily: sans, transition: "border-color 0.2s" };
  const sevColors = { 3: "#b55a4a", 2: "#c47d52", 1: ACCENT };
  const sevLabels = { 3: "CRITICAL", 2: "HIGH", 1: "MEDIUM" };

  return (
    <div style={{ minHeight: "100vh", background: BG, color: TEXT_PRIMARY, fontFamily: sans }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:${BG};overflow-x:hidden}
        ::selection{background:rgba(201,169,110,0.25)}
        input:focus{outline:none;border-color:rgba(201,169,110,0.3)!important}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{width:0}
      `}</style>

      {/* Nav */}
      <nav style={{ borderBottom: `1px solid ${BORDER}`, background: "rgba(17,17,16,0.9)", backdropFilter: "blur(16px)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 840, margin: "0 auto", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontFamily: serif, fontSize: 20, fontWeight: 300, color: TEXT_PRIMARY, letterSpacing: "0.18em" }}>ALDREN</span>
          <span style={{ fontFamily: serif, fontSize: 10, fontWeight: 500, color: TEXT_TERTIARY, letterSpacing: "0.25em", textTransform: "uppercase" }}>{TAGLINE}</span>
        </div>
      </nav>

      <main style={{ maxWidth: 840, margin: "0 auto", padding: "0 24px" }}>

        {/* ━━━ Landing ━━━ */}
        {stage === "landing" && (
          <div style={{ maxWidth: 620, margin: "0 auto", paddingTop: 72, paddingBottom: 80, opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(20px)", transition: "all 0.7s ease-out" }}>
            <p style={{ fontFamily: mono, fontSize: 11, color: ACCENT, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 24 }}>AI Visibility Audit</p>

            <h1 style={{ fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 600, lineHeight: 1.15, color: TEXT_PRIMARY, letterSpacing: "-0.02em", marginBottom: 20 }}>
              Your customers are asking AI for help.<br />
              <span style={{ color: TEXT_SECONDARY }}>Is it recommending you?</span>
            </h1>

            <p style={{ fontSize: 16, lineHeight: 1.7, color: TEXT_SECONDARY, marginBottom: 44, maxWidth: 500 }}>
              We query AI the way your customers do and show you exactly who it recommends. Most businesses score under 25.
            </p>

            {/* Form */}
            <div style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "28px 26px 22px", marginBottom: 28 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
                <div><label style={fieldLabel}>Business name</label><input style={fieldInput} placeholder="Smith & Sons Plumbing" value={biz.name} onChange={(e) => setBiz({ ...biz, name: e.target.value })} /></div>
                <div><label style={fieldLabel}>Location</label><input style={fieldInput} placeholder="Raleigh, NC" value={biz.location} onChange={(e) => setBiz({ ...biz, location: e.target.value })} /></div>
                <div style={{ gridColumn: "1/-1" }}><label style={fieldLabel}>What does your business do?</label><input style={fieldInput} placeholder="residential plumbing, family law, HVAC repair..." value={biz.service} onChange={(e) => setBiz({ ...biz, service: e.target.value })} /></div>
              </div>
              <button disabled={!biz.name || !biz.location || !biz.service} onClick={runAudit} style={{
                width: "100%", padding: "14px", background: ACCENT, color: "#111110", border: "none", borderRadius: 8,
                fontSize: 14, fontWeight: 600, fontFamily: sans, cursor: "pointer", transition: "opacity 0.2s",
                opacity: (!biz.name || !biz.location || !biz.service) ? 0.3 : 1,
              }}>Run audit</button>
              <p style={{ textAlign: "center", fontFamily: mono, fontSize: 11, color: TEXT_TERTIARY, marginTop: 12 }}>Free · ~60 seconds · Real AI queries</p>
            </div>

            <p style={{ fontSize: 13, color: TEXT_TERTIARY }}>Queries match patterns used with ChatGPT, Claude, Gemini, and Perplexity.</p>
          </div>
        )}

        {/* ━━━ Running ━━━ */}
        {stage === "running" && (
          <div style={{ maxWidth: 480, margin: "0 auto", paddingTop: 120, textAlign: "center", animation: "fadeIn 0.4s ease-out" }}>
            <p style={{ fontFamily: mono, fontSize: 11, color: ACCENT, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 20 }}>Audit in progress</p>
            <p style={{ fontSize: 17, fontWeight: 500, color: TEXT_PRIMARY, marginBottom: 28 }}>{statusText}</p>
            <div style={{ height: 2, background: "rgba(232,224,208,0.06)", borderRadius: 1, overflow: "hidden", marginBottom: 16 }}>
              <div style={{ height: "100%", background: ACCENT, borderRadius: 1, width: `${progress}%`, transition: "width 0.5s ease-out" }} />
            </div>
            <p style={{ fontFamily: mono, fontSize: 11, color: TEXT_TERTIARY }}>{Math.round(progress)}% complete</p>
          </div>
        )}

        {/* ━━━ Results ━━━ */}
        {stage === "results" && results && (
          <div style={{ paddingTop: 40, paddingBottom: 80, animation: "fadeIn 0.5s ease-out" }}>
            {/* Header */}
            <div style={{ ...panel, display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 28 }}>
              <div>
                <p style={{ fontFamily: mono, fontSize: 10, fontWeight: 600, color: ACCENT, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Visibility report</p>
                <h2 style={{ fontSize: 26, fontWeight: 700, color: TEXT_PRIMARY, letterSpacing: "-0.01em", marginBottom: 4 }}>{biz.name}</h2>
                <p style={{ fontSize: 14, color: TEXT_SECONDARY }}>{biz.service} · {biz.location} · {new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</p>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
                <ScoreArc score={results.score} />
                <span style={{ fontFamily: mono, fontSize: 12, fontWeight: 600, color: results.grade.color, background: results.grade.color + "18", padding: "4px 12px", borderRadius: 5, letterSpacing: "0.04em" }}>{results.grade.letter} · {results.grade.label}</span>
              </div>
            </div>

            {/* Lost leads */}
            {results.score < 80 && <LostLeads lost={results.lostLeads} score={results.score} top={results.ranked.length > 0 ? results.ranked[0].name : null} />}

            {/* KPIs */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 1, background: BORDER, borderRadius: 10, overflow: "hidden", marginBottom: 24 }}>
              {[
                { v: results.mentioned, l: "AI mentions", s: `/ ${results.total}` },
                { v: results.ranked.length, l: "Competitors", s: "" },
                { v: `~${results.lostLeads}`, l: "Est. lost/mo", s: "" },
                { v: `${results.score}%`, l: "Visibility", s: "" },
              ].map((k, i) => (
                <div key={i} style={{ padding: "18px 16px", background: BG }}>
                  <span style={{ fontFamily: mono, fontSize: 20, fontWeight: 700, color: TEXT_PRIMARY }}>{k.v}<span style={{ fontSize: 11, fontWeight: 400, color: TEXT_TERTIARY, marginLeft: 3 }}>{k.s}</span></span>
                  <div style={{ fontFamily: mono, fontSize: 9, color: TEXT_TERTIARY, letterSpacing: "0.08em", textTransform: "uppercase", marginTop: 4 }}>{k.l}</div>
                </div>
              ))}
            </div>

            {/* Competitors + Queries */}
            <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20, marginBottom: 20 }}>
              <div style={panel}>
                <div style={panelHead}><h3 style={panelTitle}>Who AI recommends instead</h3><span style={panelCount}>by frequency</span></div>
                <CompetitorChart ranked={results.ranked} total={results.total} bizName={biz.name} userMentions={results.mentioned} />
              </div>
              <div style={panel}>
                <div style={panelHead}><h3 style={panelTitle}>Query breakdown</h3><span style={panelCount}>{results.mentioned}/{results.total}</span></div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                  {results.mentionResults.map((r, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, animation: `fadeIn 0.3s ease-out ${i * 0.05}s both` }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: r.mentioned ? "#6b9e78" : "rgba(181,90,74,0.6)", flexShrink: 0 }} />
                      <span style={{ fontFamily: mono, fontSize: 11, color: TEXT_SECONDARY, flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.prompt}</span>
                      <span style={{ fontFamily: mono, fontSize: 9, fontWeight: 600, color: r.mentioned ? "#6b9e78" : "rgba(181,90,74,0.6)", letterSpacing: "0.06em", flexShrink: 0 }}>{r.mentioned ? "FOUND" : "MISSING"}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Quick Win */}
            <div style={{ marginBottom: 20 }}>
              <p style={{ fontFamily: mono, fontSize: 10, fontWeight: 600, color: TEXT_TERTIARY, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>Your free quick win</p>
              <QuickWinCard qw={results.quickWin} />
            </div>

            {/* Recommendations */}
            <div style={panel}>
              <div style={panelHead}><h3 style={panelTitle}>Action plan</h3><span style={panelCount}>{results.recommendations.filter((r) => r.sev === 3).length} critical</span></div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {results.recommendations.map((rec, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, padding: "14px 16px", borderRadius: 8, background: "rgba(0,0,0,0.15)", border: `1px solid ${BORDER}`, animation: `fadeIn 0.3s ease-out ${i * 0.06}s both` }}>
                    <span style={{ fontFamily: mono, fontSize: 9, fontWeight: 700, color: sevColors[rec.sev], background: sevColors[rec.sev] + "15", borderRadius: 4, padding: "3px 7px", letterSpacing: "0.08em", height: "fit-content", flexShrink: 0, marginTop: 2 }}>{sevLabels[rec.sev]}</span>
                    <div>
                      <p style={{ fontSize: 14, fontWeight: 600, color: "rgba(232,224,208,0.85)", marginBottom: 3 }}>{rec.title}</p>
                      <p style={{ fontSize: 12.5, color: TEXT_SECONDARY, lineHeight: 1.5 }}>{rec.body}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* CTA */}
            <div style={{ background: ACCENT_DIM, border: `1px solid rgba(201,169,110,0.2)`, borderRadius: 12, padding: "40px 32px", textAlign: "center", marginBottom: 28 }}>
              <p style={{ fontFamily: mono, fontSize: 10, fontWeight: 600, color: "#b55a4a", letterSpacing: "0.1em", marginBottom: 14 }}>~{results.lostLeads} LEADS LOST EVERY MONTH YOU WAIT</p>
              <h3 style={{ fontSize: 20, fontWeight: 700, color: TEXT_PRIMARY, marginBottom: 8 }}>Ready to become the recommendation?</h3>
              <p style={{ fontSize: 14, color: TEXT_SECONDARY, maxWidth: 420, margin: "0 auto 22px", lineHeight: 1.6 }}>We build and execute the strategy to make AI recommend your business first.</p>
              <button onClick={() => setShowContact(true)} style={{ padding: "13px 32px", background: ACCENT, color: "#111110", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, fontFamily: sans, cursor: "pointer" }}>Get your strategy</button>
            </div>

            <button onClick={() => { setStage("landing"); setResults(null); }} style={{ display: "block", margin: "0 auto", padding: "10px 20px", background: "transparent", border: `1px solid ${BORDER}`, borderRadius: 6, color: TEXT_TERTIARY, fontSize: 13, fontFamily: mono, cursor: "pointer" }}>Run another audit</button>
          </div>
        )}

        {showContact && <ContactModal onClose={() => setShowContact(false)} business={biz} results={results} />}
      </main>

      <footer style={{ maxWidth: 840, margin: "0 auto", padding: "20px 24px 28px", borderTop: `1px solid ${BORDER}`, fontFamily: mono, fontSize: 11, color: TEXT_TERTIARY, display: "flex", gap: 8 }}>
        <span>© 2026 Aldren</span><span style={{ color: "rgba(232,224,208,0.1)" }}>·</span><span>aldren.xyz</span>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
